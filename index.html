<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text To Speech Converter</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="hero">

<h1>Text To Speech <span>Converter</span></h1>

<!-- LANGUAGE SWITCH -->
<div class="language-bar">

<select id="fromLang">
<option value="auto">Auto Detect</option>
<option value="id">Indonesian</option>
<option value="en">English</option>
</select>

<button id="swapLang">⇄</button>

<select id="toLang">
<option value="en">English</option>
<option value="id">Indonesian</option>
</select>

</div>

<!-- TEXT INPUT -->
<textarea placeholder="Write anything here..."></textarea>

<!-- AI Correction -->
<div id="correctionPreview" class="correction-box"></div>

<!-- CONTROL AREA -->
<div class="row">

<select></select>

<button id="listenBtn">
Listen
</button>

<button id="translateBtn">
Translate
</button>

<button onclick="generatePoster()">
Generate Poster
</button>

</div>

<!-- TRANSLATION RESULT -->
<div id="translationResult" style="
margin-top:20px;
font-size:18px;
max-width:700px;
width:100%;
text-align:center;">
</div>

<!-- POSTER -->
<canvas id="posterCanvas"
width="800"
height="1000"
style="
margin-top:30px;
max-width:700px;
width:100%;
border-radius:15px;
display:block;">
</canvas>

</div>

<script src="script.js"></script>

</body>
</html>
